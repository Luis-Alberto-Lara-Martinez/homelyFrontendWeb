<div class="min-h-screen flex flex-col font-sans relative">
  <!-- Layout Header -->
  <app-header *ngIf="showHeaderFooter"></app-header>

  <!-- Main Content Route -->
  <main class="flex-grow">
    <router-outlet></router-outlet>
  </main>

  <!-- Layout Footer -->
  <app-footer *ngIf="showHeaderFooter"></app-footer>

  <!-- Chatbot Window -->
  <div *ngIf="isChatOpen"
    class="fixed right-6 bottom-24 z-[60] w-[350px] sm:w-[400px] bg-white rounded-3xl shadow-[0_20px_60px_-15px_rgba(0,96,90,0.3)] overflow-hidden flex flex-col border border-brand-blue/10 animate-fade-in-up"
    style="height: 600px; max-height: calc(100vh - 120px);">

    <!-- Chat Header -->
    <div
      class="bg-gradient-to-r from-brand-blue to-blue-800 p-5 flex justify-between items-center text-white relative overflow-hidden">
      <div class="absolute -right-10 -top-10 w-32 h-32 bg-white/10 rounded-full blur-2xl"></div>
      <div class="flex items-center gap-4 relative z-10">
        <div class="relative">
          <div
            class="w-12 h-12 bg-white/20 backdrop-blur-sm rounded-full flex items-center justify-center shadow-inner">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z">
              </path>
            </svg>
          </div>
          <span class="absolute bottom-0 right-0 w-3.5 h-3.5 bg-green-400 border-2 border-blue-800 rounded-full"></span>
        </div>
        <div>
          <h4 class="font-extrabold text-lg leading-tight">Homely Assistant</h4>
          <p class="text-xs text-blue-100 font-medium">En línea</p>
        </div>
      </div>
      <button (click)="toggleChat()"
        class="text-white/70 hover:text-white hover:bg-white/20 p-2 rounded-full transition-colors relative z-10">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>

    <!-- Chat Messages -->
    <div class="flex-1 bg-[#F8FAFC] p-5 overflow-y-auto flex flex-col gap-5">


    </div>

    <!-- Chat Input Area -->
    <div class="p-4 bg-white border-t border-gray-100 shadow-[0_-5px_15px_rgba(0,0,0,0.02)] relative z-10">
      <div class="relative flex items-center">
        <button class="absolute left-3 text-gray-400 hover:text-brand-blue transition-colors p-1">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13">
            </path>
          </svg>
        </button>
        <input type="text" placeholder="Escribe tu mensaje..."
          class="w-full bg-gray-50 border border-gray-200 rounded-full py-3.5 pl-12 pr-14 text-sm font-medium text-gray-700 outline-none focus:bg-white focus:border-brand-blue focus:ring-2 focus:ring-brand-blue/20 transition-all">
        <button
          class="absolute right-2 top-1/2 -translate-y-1/2 w-9 h-9 bg-brand-blue rounded-full flex items-center justify-center text-white hover:bg-blue-700 hover:scale-105 transition-all shadow-md">
          <svg class="w-4 h-4 ml-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
              d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
          </svg>
        </button>
      </div>
      <div class="text-center mt-3">
        <span class="text-[11px] text-gray-400 font-medium">Powered by <span class="font-bold text-gray-500">Homely
            AI</span></span>
      </div>
    </div>
  </div>

  <!-- Floating Button -->
  <button (click)="toggleChat()"
    [ngClass]="{'scale-90 opacity-0 pointer-events-none translate-y-4': isChatOpen, 'scale-100 opacity-100 translate-y-0': !isChatOpen}"
    class="fixed right-6 bottom-6 z-50 inline-flex items-center justify-center gap-3 rounded-full bg-gradient-brand px-6 py-4 text-base font-extrabold text-white shadow-2xl shadow-brand-blue/40 transition-all duration-300 hover:shadow-brand-blue/60 hover:-translate-y-1 focus:outline-none group"
    type="button" aria-label="Botón flotante de acción">
    <div class="relative">
      <svg class="w-6 h-6 group-hover:animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
          d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z">
        </path>
      </svg>
      <span class="absolute -top-1 -right-1 w-2.5 h-2.5 bg-red-500 border-2 border-white rounded-full"></span>
    </div>
    Asistente Virtual
  </button>
</div>
