<section class="py-20 bg-white relative overflow-hidden border-b border-gray-100">
  <!-- Brand design system decorative blobs (matching why-choose-us) -->
  <div class="absolute inset-0 z-0 opacity-40 pointer-events-none overflow-hidden">
    <div class="absolute -left-32 top-0 w-[500px] h-[500px] rounded-full bg-brand-blue/10 blur-[100px]"></div>
    <div class="absolute right-0 bottom-0 w-[600px] h-[600px] rounded-full bg-brand-purple/10 blur-[100px]"></div>
  </div>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
    
    <!-- Section Header (Symmetrical & Centered - matching CEO section) -->
    <div class="text-center mb-12">
      <span class="inline-block text-xs font-black uppercase tracking-[0.3em] text-brand-blue mb-4 bg-brand-blue/5 px-4 py-1.5 rounded-full border border-brand-blue/10">
        Reseñas
      </span>
      <h2 class="text-3xl md:text-5xl font-extrabold text-brand-dark tracking-tight leading-tight">
        Por qué <span class="text-gradient-brand">confían</span> en nosotros
      </h2>
      <div class="w-20 h-1.5 bg-gradient-brand mx-auto mt-4 rounded-full opacity-20"></div>
    </div>

    <!-- Viewport Container -->
    <div class="overflow-hidden -mx-4 px-4 pb-4" 
         (mouseenter)="stopAutoPlay()" 
         (mouseleave)="startAutoPlay()">
      <div class="flex transition-transform duration-700 ease-out"
           [style.transform]="'translate3d(-' + (currentIndex * slideWidth) + '%, 0, 0)'">
        
        <!-- Testimonials Cards (Matching CEO & Benefit Cards Rounded-[2rem] Design) -->
        <div *ngFor="let t of testimonials; let i = index"
             class="w-full md:w-1/2 lg:w-1/3 flex-shrink-0 px-3 transition-all duration-500">
             
          <div [class]="t.featured 
               ? 'bg-gradient-to-b from-brand-blue/[0.03] to-white text-brand-dark p-8 rounded-[2rem] border border-brand-blue/20 shadow-[0_15px_50px_-15px_rgba(75,123,245,0.08)] hover:shadow-[0_30px_60px_-12px_rgba(75,123,245,0.15)] h-full relative flex flex-col items-center justify-between text-center transform hover:-translate-y-2 transition-all duration-500' 
               : 'bg-white text-brand-dark p-8 rounded-[2rem] border border-gray-100 shadow-[0_15px_50px_-15px_rgba(0,0,0,0.03)] hover:shadow-[0_30px_60px_-12px_rgba(75,123,245,0.08)] h-full relative hover:border-gray-200/80 hover:-translate-y-2 transition-all duration-500 flex flex-col items-center justify-between text-center'"
               style="min-height: 255px;">
               
            <!-- Decorative Quotes Icon (Soft accent) -->
            <div class="text-brand-blue/5 absolute top-6 left-1/2 -translate-x-1/2 pointer-events-none select-none">
              <svg class="h-10 w-10" fill="currentColor" viewBox="0 0 32 32">
                <path d="M9.352 4C4.456 7.456 1 13.12 1 19.36c0 5.088 3.072 8.064 6.624 8.064 3.36 0 5.856-2.688 5.856-5.856 0-3.168-2.208-5.472-5.088-5.472-.576 0-1.344.096-1.536.192.48-3.264 3.552-7.104 6.624-9.024L9.352 4zm16.512 0c-4.896 3.456-8.352 9.12-8.352 15.36 0 5.088 3.072 8.064 6.624 8.064 3.264 0 5.856-2.688 5.856-5.856 0-3.168-2.304-5.472-5.184-5.472-.576 0-1.248.096-1.44.192.48-3.264 3.456-7.104 6.528-9.024L25.864 4z"></path>
              </svg>
            </div>

            <!-- Card Quote Text -->
            <p class="text-gray-600 leading-relaxed italic relative z-10 mb-6 font-medium text-sm md:text-[14.5px] px-2 pt-4">
              {{ t.text }}
            </p>

            <!-- User Info Section (Matching Rounded-2xl CEO Avatar style) -->
            <div class="flex flex-col items-center border-t border-gray-50 pt-4 mt-auto w-full relative">
              <div class="w-12 h-12 rounded-2xl overflow-hidden border border-gray-100 shadow-sm bg-gray-50 mb-2.5 transform group-hover:scale-105 transition-transform duration-300">
                <img [src]="t.avatar" [alt]="t.name" class="w-full h-full object-cover">
              </div>
              <div class="text-center">
                <h4 class="font-bold text-brand-dark text-sm tracking-tight">{{ t.name }}</h4>
                <p class="text-gray-400 text-[10px] font-bold uppercase tracking-wider mt-0.5">{{ t.role }}</p>
              </div>
              
              <!-- Mini "Destacado" Badge matching layout -->
              <span *ngIf="t.featured" 
                    class="mt-2.5 text-[8px] font-black uppercase tracking-widest text-brand-blue bg-brand-blue/5 px-2.5 py-1 rounded-md border border-brand-blue/10">
                Destacado
              </span>
            </div>

          </div>
        </div>

      </div>
    </div>

    <!-- Navigation & Dots Control Bar (Symmetrical design system) -->
    <div class="flex flex-col items-center justify-center gap-4 mt-8">
      
      <!-- Bullet Indicators -->
      <div class="flex items-center gap-2">
        <button *ngFor="let dot of [].constructor(maxIndex + 1); let idx = index"
                (click)="setCurrentIndex(idx)"
                [class]="currentIndex === idx ? 'w-7 bg-brand-blue/90 shadow-sm' : 'w-2 bg-gray-200 hover:bg-gray-300'"
                class="h-2 rounded-full transition-all duration-500 cursor-pointer focus:outline-none"
                [attr.aria-label]="'Ir al panel ' + (idx + 1)">
        </button>
      </div>

      <!-- Arrow Buttons (Sleek styled round controls) -->
      <div class="flex items-center gap-2.5">
        <button type="button" 
                (click)="prev()" 
                class="w-10 h-10 rounded-full border border-gray-200/80 bg-white text-gray-600 flex items-center justify-center hover:bg-gray-50 hover:text-brand-blue hover:border-brand-blue/20 active:scale-90 transition-all shadow-sm focus:outline-none cursor-pointer">
          <svg class="w-4.5 h-4.5 transform -translate-x-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path>
          </svg>
        </button>
        <button type="button" 
                (click)="next()" 
                class="w-10 h-10 rounded-full border border-gray-200/80 bg-white text-gray-600 flex items-center justify-center hover:bg-gray-50 hover:text-brand-blue hover:border-brand-blue/20 active:scale-90 transition-all shadow-sm focus:outline-none cursor-pointer">
          <svg class="w-4.5 h-4.5 transform translate-x-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path>
          </svg>
        </button>
      </div>

    </div>

  </div>
</section>
