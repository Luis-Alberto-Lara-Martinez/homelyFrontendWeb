<header class="fixed w-full z-50 bg-white/80 backdrop-blur-md border-b border-gray-100 shadow-sm transition-all">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-20">
      <!-- Logo -->
      <a routerLink="/" class="flex-shrink-0 flex items-center gap-2 cursor-pointer group">
        <img src="/assets/logos/logo.png" alt="Homely Logo"
          class="w-10 h-10 object-contain rounded-xl shadow-lg shadow-brand-blue/30 group-hover:scale-105 transition-transform duration-300">
        <span class="font-bold text-xl text-brand-dark tracking-tight">Homely<span
            class="text-brand-blue">.</span></span>
      </a>

      <!-- Navegación para escritorio -->
      <nav class="hidden lg:flex space-x-6">
        <a routerLink="/" routerLinkActive="text-brand-blue" [routerLinkActiveOptions]="{exact: true}"
          class="text-brand-dark font-medium hover:text-brand-blue transition-colors">Inicio</a>
        <a routerLink="/comprar-alquilar" routerLinkActive="text-brand-blue"
          class="text-gray-500 font-medium hover:text-brand-blue transition-colors whitespace-nowrap">Comprar/Alquilar</a>
        <a routerLink="/vender" routerLinkActive="text-brand-blue"
          class="text-gray-500 font-medium hover:text-brand-blue transition-colors">Vender</a>
        <a routerLink="/nosotros" routerLinkActive="text-brand-blue"
          class="text-gray-500 font-medium hover:text-brand-blue transition-colors whitespace-nowrap">Sobre Nosotros</a>
        <a routerLink="/contacto" routerLinkActive="text-brand-blue"
          class="text-gray-500 font-medium hover:text-brand-blue transition-colors">Contacto</a>
      </nav>

      <!-- Botones de inicio de sesión y registro -->
      <div class="hidden lg:flex items-center gap-4">
        <ng-container *ngIf="!usersService.isAuthenticated()">
          <a routerLink="/login"
            class="bg-gradient-brand hover:opacity-90 active:scale-95 transition-all text-white px-6 py-2.5 rounded-full font-medium shadow-md shadow-brand-blue/30 inline-block font-semibold">
            Inicio Sesión
          </a>
        </ng-container>
        <ng-container *ngIf="usersService.isAuthenticated()">
          <button (click)="logout()"
            class="bg-red-500 hover:bg-red-600 active:scale-95 transition-all text-white px-6 py-2.5 rounded-full font-medium shadow-md shadow-red-200 inline-block font-semibold">
            Cerrar Sesión
          </button>
        </ng-container>
      </div>

      <!-- Botones para móvil -->
      <div class="lg:hidden flex items-center">
        <button (click)="toggleMenu()" type="button"
          class="text-gray-600 hover:text-brand-blue focus:outline-none transition-colors" aria-label="Abrir menú">
          <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
      </div>
    </div>

    <div *ngIf="menuOpen" class="lg:hidden">
      <nav class="px-4 pb-4 space-y-2 bg-white border-t border-gray-200">
        <a routerLink="/" routerLinkActive="text-brand-blue" [routerLinkActiveOptions]="{exact: true}"
          class="block text-brand-dark font-medium hover:text-brand-blue transition-colors"
          (click)="closeMenu()">Inicio</a>
        <a routerLink="/comprar-alquilar" routerLinkActive="text-brand-blue"
          class="block text-gray-500 font-medium hover:text-brand-blue transition-colors whitespace-nowrap"
          (click)="closeMenu()">Comprar/Alquilar</a>
        <a routerLink="/vender" routerLinkActive="text-brand-blue"
          class="block text-gray-500 font-medium hover:text-brand-blue transition-colors"
          (click)="closeMenu()">Vender</a>
        <a routerLink="/nosotros" routerLinkActive="text-brand-blue"
          class="block text-gray-500 font-medium hover:text-brand-blue transition-colors whitespace-nowrap"
          (click)="closeMenu()">Sobre Nosotros</a>
        <a routerLink="/contacto" routerLinkActive="text-brand-blue"
          class="block text-gray-500 font-medium hover:text-brand-blue transition-colors"
          (click)="closeMenu()">Contacto</a>

        <div class="pt-3 border-t border-gray-200 flex flex-col gap-2">
          <ng-container *ngIf="!usersService.isAuthenticated()">
            <a routerLink="/login" class="block text-brand-dark font-medium hover:text-brand-blue transition-colors"
              (click)="closeMenu()">Iniciar sesión</a>
            <a routerLink="/registro"
              class="block bg-gradient-brand hover:opacity-90 active:scale-95 transition-all text-white px-6 py-2.5 rounded-full font-medium shadow-md shadow-brand-blue/30 font-semibold text-center"
              (click)="closeMenu()">Registrarse</a>
          </ng-container>
          <ng-container *ngIf="usersService.isAuthenticated()">
            <button (click)="logout()"
              class="block bg-red-500 hover:bg-red-600 active:scale-95 transition-all text-white px-6 py-2.5 rounded-full font-medium shadow-md shadow-red-200 font-semibold text-center">
              Cerrar Sesión
            </button>
          </ng-container>
        </div>
      </nav>
    </div>
  </div>
</header>
