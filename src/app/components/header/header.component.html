<header class="fixed w-full z-50 bg-white/80 backdrop-blur-md border-b border-gray-100 shadow-sm transition-all">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-20">
      <!-- Logo -->
      <a routerLink="/" class="flex-shrink-0 flex items-center gap-2 cursor-pointer group">
        <img src="/assets/logos/logo.png" alt="Homely Logo"
          class="w-10 h-10 object-contain rounded-xl shadow-lg shadow-brand-blue/30 group-hover:scale-105 transition-transform duration-300">
        <span class="font-bold text-xl text-brand-dark tracking-tight">Homely<span
            class="text-brand-blue">.</span></span>
      </a>

      <!-- Navegación para escritorio -->
      <nav class="hidden lg:flex items-center space-x-1">
        <a routerLink="/home" routerLinkActive="bg-brand-blue/10 !text-brand-blue"
          [routerLinkActiveOptions]="{exact: true}"
          class="px-4 py-2 rounded-full text-gray-600 font-bold hover:bg-gray-50 transition-all duration-300">Inicio</a>
        <a routerLink="/comprar-alquilar" routerLinkActive="bg-brand-blue/10 !text-brand-blue"
          class="px-4 py-2 rounded-full text-gray-600 font-bold hover:bg-gray-50 transition-all duration-300 whitespace-nowrap">Comprar/Alquilar</a>
        <a routerLink="/vender" routerLinkActive="bg-brand-blue/10 !text-brand-blue"
          class="px-4 py-2 rounded-full text-gray-600 font-bold hover:bg-gray-50 transition-all duration-300">Vender</a>
        <a routerLink="/nosotros" routerLinkActive="bg-brand-blue/10 !text-brand-blue"
          class="px-4 py-2 rounded-full text-gray-600 font-bold hover:bg-gray-50 transition-all duration-300 whitespace-nowrap">Sobre
          Nosotros</a>
        <a routerLink="/contacto" routerLinkActive="bg-brand-blue/10 !text-brand-blue"
          class="px-4 py-2 rounded-full text-gray-600 font-bold hover:bg-gray-50 transition-all duration-300">Contacto</a>

        <!-- Admin Links -->
        <ng-container *ngIf="usersService.isAdmin()">
          <div class="h-6 w-px bg-gray-200 mx-2 hidden lg:block"></div>
          <a routerLink="/admin/usuarios" routerLinkActive="ring-2 ring-white ring-offset-2 ring-offset-brand-blue"
            class="px-5 py-3.5 rounded-full bg-gradient-brand text-white font-black text-xs uppercase tracking-wider shadow-lg shadow-brand-blue/30 hover:shadow-brand-blue/50 hover:scale-105 transition-all duration-300 whitespace-nowrap flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
            </svg>
            Usuarios
          </a>
          <a routerLink="/admin/propiedades" routerLinkActive="ring-2 ring-white ring-offset-2 ring-offset-brand-blue"
            class="px-5 py-3.5 rounded-full bg-gradient-brand text-white font-black text-xs uppercase tracking-wider shadow-lg shadow-brand-blue/30 hover:shadow-brand-blue/50 hover:scale-105 transition-all duration-300 whitespace-nowrap flex items-center gap-2 ml-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
            Propiedades
          </a>
        </ng-container>
      </nav>

      <!-- Botones de inicio de sesión y registro -->
      <div class="hidden lg:flex items-center gap-4">
        <ng-container *ngIf="!usersService.isAuthenticated()">
          <a routerLink="/login"
            class="bg-gradient-brand hover:opacity-90 active:scale-95 transition-all text-white px-6 py-2.5 rounded-full font-medium shadow-md shadow-brand-blue/30 inline-block font-semibold">
            Inicio Sesión
          </a>
        </ng-container>
        <ng-container *ngIf="usersService.isAuthenticated()">
          <!-- Dropdown Mi Cuenta -->
          <div class="relative">
            <button (click)="toggleDropdown()"
              class="flex items-center gap-2 bg-gray-50 hover:bg-gray-100 border border-gray-200 text-brand-dark p-1.5 rounded-full font-medium transition-all active:scale-95 shadow-sm hover:shadow-md">
              <div
                class="w-9 h-9 rounded-full overflow-hidden flex-shrink-0 border border-white bg-brand-blue/5 shadow-inner">
                <img *ngIf="user?.imageUrl; else defaultIcon" [src]="user.imageUrl" class="w-full h-full object-cover"
                  alt="Avatar">
                <ng-template #defaultIcon>
                  <div class="w-full h-full flex items-center justify-center text-brand-blue">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                  </div>
                </ng-template>
              </div>
              <svg class="w-4 h-4 text-gray-400 mr-1.5 transition-transform duration-200"
                [class.rotate-180]="dropdownOpen" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
              </svg>
            </button>

            <!-- Menú desplegable -->
            <div *ngIf="dropdownOpen" (click)="dropdownOpen = false"
              class="absolute right-0 mt-2 w-48 bg-white rounded-2xl shadow-xl border border-gray-100 py-2 z-50 animate-in fade-in slide-in-from-top-2 duration-200">
              <a routerLink="/mi-cuenta"
                class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 transition-colors">
                <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
                Mi cuenta
              </a>
              <a routerLink="/favoritos"
                class="flex items-center gap-3 px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 transition-colors">
                <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                </svg>
                Favoritos
              </a>
              <hr class="my-1 border-gray-100">
              <button (click)="logout()"
                class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
                Cerrar sesión
              </button>
            </div>
          </div>
        </ng-container>
      </div>

      <!-- Botones para móvil -->
      <div class="lg:hidden flex items-center">
        <button (click)="toggleMenu()" type="button"
          class="text-gray-600 hover:text-brand-blue focus:outline-none transition-colors" aria-label="Abrir menú">
          <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
      </div>
    </div>

    <div *ngIf="menuOpen" class="lg:hidden">
      <nav class="px-4 pb-4 space-y-2 bg-white border-t border-gray-200">
        <a routerLink="/" routerLinkActive="text-brand-blue" [routerLinkActiveOptions]="{exact: true}"
          class="block text-brand-dark font-medium hover:text-brand-blue transition-colors"
          (click)="closeMenu()">Inicio</a>
        <a routerLink="/comprar-alquilar" routerLinkActive="text-brand-blue"
          class="block text-gray-500 font-medium hover:text-brand-blue transition-colors whitespace-nowrap"
          (click)="closeMenu()">Comprar/Alquilar</a>
        <a routerLink="/vender" routerLinkActive="text-brand-blue"
          class="block text-gray-500 font-medium hover:text-brand-blue transition-colors"
          (click)="closeMenu()">Vender</a>
        <a routerLink="/nosotros" routerLinkActive="text-brand-blue"
          class="block text-gray-500 font-medium hover:text-brand-blue transition-colors whitespace-nowrap"
          (click)="closeMenu()">Sobre Nosotros</a>
        <a routerLink="/contacto" routerLinkActive="text-brand-blue"
          class="block text-gray-500 font-medium hover:text-brand-blue transition-colors"
          (click)="closeMenu()">Contacto</a>

        <!-- Admin Links Mobile -->
        <ng-container *ngIf="usersService.isAdmin()">
          <div class="pt-2 mt-2 border-t border-gray-100">
            <span class="text-[10px] font-black uppercase tracking-widest text-gray-400 px-3">Administración</span>
            <a routerLink="/admin/usuarios" routerLinkActive="text-brand-blue"
              class="block text-gray-500 font-medium hover:text-brand-blue transition-colors px-3 py-2"
              (click)="closeMenu()">Administrar Usuarios</a>
            <a routerLink="/admin/propiedades" routerLinkActive="text-brand-blue"
              class="block text-gray-500 font-medium hover:text-brand-blue transition-colors px-3 py-2"
              (click)="closeMenu()">Administrar Propiedades</a>
          </div>
        </ng-container>

        <div class="pt-3 border-t border-gray-200 flex flex-col gap-2">
          <ng-container *ngIf="!usersService.isAuthenticated()">
            <a routerLink="/login" class="block text-brand-dark font-medium hover:text-brand-blue transition-colors"
              (click)="closeMenu()">Iniciar sesión</a>
            <a routerLink="/registro"
              class="block bg-gradient-brand hover:opacity-90 active:scale-95 transition-all text-white px-6 py-2.5 rounded-full font-medium shadow-md shadow-brand-blue/30 font-semibold text-center"
              (click)="closeMenu()">Registrarse</a>
          </ng-container>
          <ng-container *ngIf="usersService.isAuthenticated()">
            <a routerLink="/mi-cuenta" class="block text-brand-dark font-medium hover:text-brand-blue transition-colors"
              (click)="closeMenu()">Mi cuenta</a>
            <a routerLink="/favoritos" class="block text-brand-dark font-medium hover:text-brand-blue transition-colors"
              (click)="closeMenu()">Favoritos</a>
            <button (click)="logout()"
              class="block w-full mt-2 bg-red-50 text-red-600 hover:bg-red-100 active:scale-95 transition-all px-6 py-2.5 rounded-full font-semibold text-center">
              Cerrar Sesión
            </button>
          </ng-container>
        </div>
      </nav>
    </div>
  </div>
</header>
