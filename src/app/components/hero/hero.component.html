<section
  class="relative pt-32 pb-20 lg:pt-48 lg:pb-32 overflow-hidden h-screen min-h-[700px] max-h-[900px] flex items-center">
  <!-- Background layers -->
  <div class="absolute inset-0 z-0">
    <div class="absolute inset-0 bg-white/80 sm:bg-white/70 backdrop-blur-[1px] z-10"></div>
    <div
      class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-3/4 h-3/4 bg-brand-light opacity-60 rounded-full blur-3xl animate-pulse z-10">
    </div>
    <img src="/assets/img/hero-house.jpg" alt="Modern House" class="w-full h-full object-cover object-center" />
  </div>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-20 w-full animate-fade-in-up">
    <div class="max-w-4xl mx-auto flex flex-col items-center text-center">
      <span
        class="inline-flex items-center space-x-2 py-1 px-3 rounded-full bg-brand-blue/10 text-brand-blue font-semibold text-sm mb-8 border border-brand-blue/20 backdrop-blur-sm shadow-sm">
        <span class="w-2 h-2 rounded-full bg-brand-blue animate-ping"></span>
        <span>Encuentra tu nuevo destino</span>
      </span>
      <h1
        class="text-5xl md:text-6xl lg:text-7xl font-extrabold text-brand-dark leading-tight text-balance mb-6 mx-auto">
        Descubre el hogar <br />
        <span class="text-gradient-brand">de tus sueños</span> hoy.
      </h1>
      <p class="text-xl text-gray-700 mb-10 max-w-2xl mx-auto leading-relaxed text-balance font-medium">
        Explora nuestra selección de propiedades exclusivas y encuentra el lugar perfecto para ti y tu familia con la
        ayuda de nuestros expertos agentes.
      </p>

      <!-- Caja de búsqueda -->
      <div
        class="bg-white p-4 rounded-2xl shadow-xl shadow-brand-dark/10 flex flex-col md:flex-row gap-4 border border-gray-100 hover:shadow-2xl hover:shadow-brand-blue/15 transition-shadow duration-300 w-full max-w-3xl text-left">
        <div class="flex-1 group">
          <label
            class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1 ml-1 group-focus-within:text-brand-blue transition-colors">Ubicación</label>
          <input type="text" placeholder="Ciudad, barrio, calle..."
            class="w-full bg-gray-50 rounded-xl px-4 py-3 text-gray-700 outline-none focus:bg-white focus:ring-2 focus:ring-brand-blue/30 transition-all">
        </div>
        <div class="flex-1 flex flex-col md:border-l md:border-gray-100 md:pl-4 group">
          <label
            class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1 ml-1 group-focus-within:text-brand-blue transition-colors">Tipo
            de Propiedad</label>
          <select
            class="w-full bg-gray-50 rounded-xl px-4 py-3 text-gray-700 outline-none focus:bg-white focus:ring-2 focus:ring-brand-blue/30 transition-all appearance-none cursor-pointer">
            <option>Cualquier tipo</option>
            <option>Casa o Chalet</option>
            <option>Apartamento</option>
            <option>Villa de Lujo</option>
            <option>Estudio</option>
          </select>
        </div>
        <div class="flex items-end mt-2 md:mt-0">
          <button
            class="w-full md:w-auto md:px-8 bg-gradient-brand text-white py-3.5 rounded-xl font-bold hover:shadow-lg hover:shadow-brand-blue/40 transition-all transform hover:-translate-y-0.5 active:translate-y-0 flex justify-center items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            Buscar
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
