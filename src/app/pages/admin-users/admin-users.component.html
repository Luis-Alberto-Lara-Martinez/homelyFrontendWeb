<div class="min-h-screen bg-slate-50 pt-32 pb-20">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    
    <!-- Header de la página -->
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
      <div>
        <span class="inline-block text-xs font-black uppercase tracking-[0.3em] text-brand-blue mb-3 bg-brand-blue/5 px-4 py-1.5 rounded-full border border-brand-blue/10">Panel de Control</span>
        <h1 class="text-4xl font-extrabold text-brand-dark tracking-tight">Administrar <span class="text-gradient-brand">Usuarios</span></h1>
      </div>
      
      <!-- Buscador -->
      <div class="relative w-full md:w-96 group">
        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-brand-blue transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        </span>
        <input type="text" [(ngModel)]="searchQuery" (input)="onSearch()"
          class="w-full pl-12 pr-4 py-4 rounded-2xl bg-white border border-gray-100 shadow-sm focus:ring-4 focus:ring-brand-blue/10 focus:border-brand-blue outline-none transition-all text-sm font-medium"
          placeholder="Buscar por nombre o email...">
      </div>
    </div>

    <!-- Tabla de Usuarios -->
    <div class="bg-white rounded-[2.5rem] shadow-[0_20px_50px_-20px_rgba(0,0,0,0.05)] border border-gray-100 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-left">
          <thead>
            <tr class="bg-gray-50/50 border-b border-gray-50">
              <th class="px-8 py-6 text-xs font-black uppercase tracking-widest text-gray-400">Usuario</th>
              <th class="px-8 py-6 text-xs font-black uppercase tracking-widest text-gray-400">Rol</th>
              <th class="px-8 py-6 text-xs font-black uppercase tracking-widest text-gray-400">Fecha Registro</th>
              <th class="px-8 py-6 text-xs font-black uppercase tracking-widest text-gray-400 text-right">Acciones</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-50">
            <tr *ngFor="let user of filteredUsers" class="hover:bg-gray-50/50 transition-colors group">
              <td class="px-8 py-6">
                <div class="flex items-center gap-4">
                  <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-brand-blue/10 to-brand-purple/10 flex items-center justify-center text-brand-blue font-bold shadow-sm">
                    {{user.name.charAt(0)}}
                  </div>
                  <div>
                    <p class="font-bold text-brand-dark text-base">{{user.name}}</p>
                    <p class="text-gray-400 text-sm">{{user.email}}</p>
                  </div>
                </div>
              </td>
              <td class="px-8 py-6">
                <span [class]="user.role === 'ADMIN' ? 'bg-brand-blue/10 text-brand-blue border-brand-blue/20' : 'bg-gray-100 text-gray-500 border-gray-200'"
                  class="px-3 py-1 rounded-lg text-xs font-black uppercase tracking-wider border">
                  {{user.role}}
                </span>
              </td>
              <td class="px-8 py-6 text-gray-500 text-sm font-medium">
                {{user.createdAt | date:'longDate'}}
              </td>
              <td class="px-8 py-6 text-right">
                <div class="flex items-center justify-end gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                  <button (click)="changeRole(user)" 
                    class="p-2.5 rounded-xl bg-gray-50 text-gray-400 hover:bg-brand-blue/10 hover:text-brand-blue transition-all"
                    title="Cambiar Rol">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0m-5 8a2 2 0 100-4 2 2 0 000 4zm0 0c1.306 0 2.417.835 2.83 2M9 14a3.001 3.001 0 00-2.83 2M15 11h3m-3 4h2"/></svg>
                  </button>
                  <button (click)="deleteUser(user.id)" 
                    class="p-2.5 rounded-xl bg-gray-50 text-gray-400 hover:bg-red-50 hover:text-red-500 transition-all"
                    title="Eliminar Usuario">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                  </button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
      
      <!-- Empty State -->
      <div *ngIf="filteredUsers.length === 0 && !loading" class="py-20 text-center">
        <div class="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-6">
          <svg class="w-10 h-10 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 9.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        </div>
        <h3 class="text-xl font-bold text-brand-dark mb-2">No se encontraron usuarios</h3>
        <p class="text-gray-400">Intenta con otros términos de búsqueda.</p>
      </div>

      <!-- Loading State -->
      <div *ngIf="loading" class="py-20 text-center">
        <div class="animate-spin w-10 h-10 border-4 border-brand-blue border-t-transparent rounded-full mx-auto mb-4"></div>
        <p class="text-gray-400 font-medium">Cargando base de datos...</p>
      </div>
    </div>
  </div>
</div>
