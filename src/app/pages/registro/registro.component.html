<div class="min-h-screen flex flex-col justify-center py-12 sm:px-6 lg:px-8 bg-gray-50/50">


  <div class="sm:mx-auto sm:w-full sm:max-w-xl pt-12">
    <div class="text-center">
      <a routerLink="/" class="inline-flex justify-center items-center gap-3 cursor-pointer group mb-6 w-full">
        <img src="/assets/logos/logo.png" alt="Homely Logo"
          class="w-14 h-14 object-contain rounded-2xl shadow-lg shadow-brand-blue/20 group-hover:scale-110 transition-transform duration-300">
        <span class="font-extrabold text-4xl text-brand-dark tracking-tight">Homely<span
            class="text-brand-blue">.</span></span>
      </a>
      <h2 class="mt-2 text-3xl font-extrabold text-brand-dark">
        Crear cuenta nueva
      </h2>
      <p class="mt-3 text-base text-gray-600">
        O
        <a routerLink="/login" class="font-bold text-brand-blue hover:text-brand-dark transition-colors">
          inicia sesión en tu cuenta
        </a>
      </p>
    </div>
  </div>


  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-xl pb-12">
    <div
      class="bg-white py-10 px-6 shadow-2xl shadow-brand-blue/10 sm:rounded-3xl sm:px-12 border border-blue-50/50 transition-shadow hover:shadow-brand-blue/20 duration-500">

      <form class="space-y-6" action="#" method="POST">

        <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
          <!-- Input: Nombre -->
          <div>
            <label for="nombre" class="block text-sm font-bold text-gray-700 tracking-wide mb-2 uppercase">
              Nombre
            </label>
            <div class="mt-1 relative rounded-2xl shadow-sm group">
              <input id="nombre" name="nombre" type="text" autocomplete="given-name" required
                class="appearance-none block w-full px-4 py-4 border-2 border-gray-100 rounded-2xl focus:outline-none focus:ring-0 focus:border-brand-blue text-base text-gray-900 placeholder-gray-400 bg-gray-50/50 focus:bg-white transition-all duration-300"
                placeholder="Tu nombre">
            </div>
          </div>

          <!-- Input: Apellidos -->
          <div>
            <label for="apellidos" class="block text-sm font-bold text-gray-700 tracking-wide mb-2 uppercase">
              Apellidos
            </label>
            <div class="mt-1 relative rounded-2xl shadow-sm group">
              <input id="apellidos" name="apellidos" type="text" autocomplete="family-name" required
                class="appearance-none block w-full px-4 py-4 border-2 border-gray-100 rounded-2xl focus:outline-none focus:ring-0 focus:border-brand-blue text-base text-gray-900 placeholder-gray-400 bg-gray-50/50 focus:bg-white transition-all duration-300"
                placeholder="Tus apellidos">
            </div>
          </div>
        </div>

        <!-- Input: Correo -->
        <div>
          <label for="email" class="block text-sm font-bold text-gray-700 tracking-wide mb-2 uppercase">
            Correo electrónico
          </label>
          <div class="mt-1 relative rounded-2xl shadow-sm group">
            <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none">

              <svg class="h-6 w-6 text-gray-400 group-focus-within:text-brand-blue transition-colors duration-300"
                xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z" />
                <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z" />
              </svg>
            </div>
            <input id="email" name="email" type="email" autocomplete="email" required
              class="appearance-none block w-full pl-14 pr-4 py-4 border-2 border-gray-100 rounded-2xl focus:outline-none focus:ring-0 focus:border-brand-blue text-base text-gray-900 placeholder-gray-400 bg-gray-50/50 focus:bg-white transition-all duration-300"
              placeholder="tu@email.com">
          </div>
        </div>

        <!-- Input: Contraseña -->
        <div>
          <label for="password" class="block text-sm font-bold text-gray-700 tracking-wide mb-2 uppercase">
            Contraseña
          </label>
          <div class="mt-1 relative rounded-2xl shadow-sm group">
            <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none">

              <svg class="h-6 w-6 text-gray-400 group-focus-within:text-brand-blue transition-colors duration-300"
                xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path fill-rule="evenodd"
                  d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z"
                  clip-rule="evenodd" />
              </svg>
            </div>
            <input id="password" name="password" type="password" autocomplete="new-password" required
              class="appearance-none block w-full pl-14 pr-4 py-4 border-2 border-gray-100 rounded-2xl focus:outline-none focus:ring-0 focus:border-brand-blue text-base text-gray-900 placeholder-gray-400 bg-gray-50/50 focus:bg-white transition-all duration-300"
              placeholder="••••••••">
          </div>
        </div>

        <!-- Input: Repetir Contraseña -->
        <div>
          <label for="password_confirmation" class="block text-sm font-bold text-gray-700 tracking-wide mb-2 uppercase">
            Repetir contraseña
          </label>
          <div class="mt-1 relative rounded-2xl shadow-sm group">
            <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none">

              <svg class="h-6 w-6 text-gray-400 group-focus-within:text-brand-blue transition-colors duration-300"
                xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path fill-rule="evenodd"
                  d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z"
                  clip-rule="evenodd" />
              </svg>
            </div>
            <input id="password_confirmation" name="password_confirmation" type="password" autocomplete="new-password"
              required
              class="appearance-none block w-full pl-14 pr-4 py-4 border-2 border-gray-100 rounded-2xl focus:outline-none focus:ring-0 focus:border-brand-blue text-base text-gray-900 placeholder-gray-400 bg-gray-50/50 focus:bg-white transition-all duration-300"
              placeholder="••••••••">
          </div>
        </div>

        <!-- Botón de Envío -->
        <div class="pt-4">
          <button type="submit"
            class="w-full flex justify-center py-4 px-4 border border-transparent rounded-2xl shadow-xl shadow-brand-blue/30 text-lg font-bold text-white bg-gradient-brand hover:opacity-95 hover:shadow-brand-blue/40 focus:outline-none transition-all duration-300 hover:-translate-y-1 active:scale-95 active:translate-y-0">
            Registrarse
          </button>
        </div>
      </form>

    </div>
  </div>
</div>
