<div class="pt-20 bg-slate-50 min-h-screen" id="propiedades">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-10 mb-8">
    <div class="flex items-center justify-between">
      <div>
        <h1 class="text-3xl font-extrabold text-brand-dark font-sans">Catálogo de Propiedades</h1>
        <p class="text-gray-500 mt-2">Explora todas nuestras propiedades disponibles para venta y alquiler.</p>
      </div>
      <div class="text-sm font-bold text-brand-blue bg-brand-blue/10 px-4 py-2 rounded-xl" *ngIf="!isLoading">
        {{ propertiesList.length }} Propiedades
      </div>
    </div>
  </div>

  <!-- Filter Bar (Solo se muestra cuando ya ha cargado) -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mb-12" *ngIf="!isLoading && allProperties.length > 0">
    
    <!-- Title / Label for the bar -->
    <div class="flex items-center gap-3 mb-5 ml-2 animate-in fade-in slide-in-from-left-4 duration-700">
      <div class="w-10 h-10 rounded-xl bg-gradient-brand flex items-center justify-center text-white shadow-md shadow-brand-blue/20">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"></path></svg>
      </div>
      <h3 class="text-xl font-extrabold text-brand-dark tracking-tight font-sans">Filtros Avanzados</h3>
    </div>

    <!-- Main Container styled in alignment with the Homely Design System -->
    <div class="bg-white rounded-3xl p-6 shadow-xl shadow-brand-dark/5 border border-gray-100 flex flex-col lg:flex-row gap-5 items-end relative animate-in fade-in slide-in-from-top-8 duration-700 hover:shadow-2xl hover:shadow-brand-blue/5 transition-shadow duration-500">
      
      <!-- Operación -->
      <div class="w-full lg:w-auto flex-1 relative">
        <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest block mb-2.5 ml-2">Transacción</label>
        <div class="relative">
          <button type="button" (click)="toggleDropdown('transaction', $event)" 
            class="w-full bg-gray-50 border border-gray-100 text-brand-dark font-semibold rounded-2xl px-5 py-4 text-left focus:outline-none focus:bg-white focus:ring-2 focus:ring-brand-blue/20 focus:border-brand-blue/50 transition-all cursor-pointer shadow-sm flex items-center justify-between">
            <span class="truncate" [class.text-brand-blue]="filterTransaction !== ''">{{ getDisplayValue('transaction') }}</span>
            <svg class="w-4 h-4 text-brand-blue flex-shrink-0 transition-transform duration-200" [class.rotate-180]="activeDropdown === 'transaction'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
          </button>
          
          <!-- Dropdown Transacción -->
          <div *ngIf="activeDropdown === 'transaction'" 
            class="absolute top-full left-0 mt-2 w-full min-w-[200px] bg-white rounded-2xl shadow-xl shadow-brand-dark/10 border border-gray-100 py-2 z-50 animate-in fade-in zoom-in-95 duration-200 overflow-hidden">
            <button *ngFor="let opt of transactionOptions" (click)="selectOption('transaction', opt.value, $event)"
              class="w-full text-left px-5 py-3 hover:bg-brand-blue/5 text-sm font-semibold transition-colors flex items-center justify-between"
              [class.text-brand-blue]="filterTransaction === opt.value" [class.bg-brand-blue/5]="filterTransaction === opt.value">
              {{ opt.label }}
              <svg *ngIf="filterTransaction === opt.value" class="w-4 h-4 text-brand-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Tipo de Inmueble -->
      <div class="w-full lg:w-auto flex-1 relative">
        <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest block mb-2.5 ml-2">Tipo de Inmueble</label>
        <div class="relative">
          <button type="button" (click)="toggleDropdown('type', $event)" 
            class="w-full bg-gray-50 border border-gray-100 text-brand-dark font-semibold rounded-2xl px-5 py-4 text-left focus:outline-none focus:bg-white focus:ring-2 focus:ring-brand-blue/20 focus:border-brand-blue/50 transition-all cursor-pointer shadow-sm flex items-center justify-between">
            <span class="truncate" [class.text-brand-blue]="filterType !== ''">{{ getDisplayValue('type') }}</span>
            <svg class="w-4 h-4 text-brand-blue flex-shrink-0 transition-transform duration-200" [class.rotate-180]="activeDropdown === 'type'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
          </button>
          
          <!-- Dropdown Tipo -->
          <div *ngIf="activeDropdown === 'type'" 
            class="absolute top-full left-0 mt-2 w-full min-w-[200px] bg-white rounded-2xl shadow-xl shadow-brand-dark/10 border border-gray-100 py-2 z-50 animate-in fade-in zoom-in-95 duration-200 overflow-hidden">
            <button *ngFor="let opt of typeOptions" (click)="selectOption('type', opt.value, $event)"
              class="w-full text-left px-5 py-3 hover:bg-brand-blue/5 text-sm font-semibold transition-colors flex items-center justify-between"
              [class.text-brand-blue]="filterType === opt.value" [class.bg-brand-blue/5]="filterType === opt.value">
              {{ opt.label }}
              <svg *ngIf="filterType === opt.value" class="w-4 h-4 text-brand-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Presupuesto -->
      <div class="w-full lg:w-[35%] relative">
        <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest block mb-2.5 ml-2">Presupuesto</label>
        <div class="flex items-center gap-3">
          <div class="relative flex-1">
            <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-brand-blue font-bold text-sm">Mín</span>
            <input type="number" [(ngModel)]="filterMinPrice" (ngModelChange)="applyFilters()" placeholder="0 €" min="0" class="w-full bg-gray-50 border border-gray-100 text-brand-dark font-semibold rounded-2xl pl-14 pr-4 py-4 focus:outline-none focus:bg-white focus:ring-2 focus:ring-brand-blue/20 focus:border-brand-blue/50 transition-all placeholder-gray-400/80 shadow-sm">
          </div>
          <span class="text-gray-300 font-bold">-</span>
          <div class="relative flex-1">
            <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-brand-blue font-bold text-sm">Máx</span>
            <input type="number" [(ngModel)]="filterMaxPrice" (ngModelChange)="applyFilters()" placeholder="Sin límite" min="0" class="w-full bg-gray-50 border border-gray-100 text-brand-dark font-semibold rounded-2xl pl-14 pr-4 py-4 focus:outline-none focus:bg-white focus:ring-2 focus:ring-brand-blue/20 focus:border-brand-blue/50 transition-all placeholder-gray-400/80 shadow-sm">
          </div>
        </div>
      </div>

      <!-- Habitaciones -->
      <div class="w-full lg:w-auto flex-1 relative">
        <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest block mb-2.5 ml-2">Habitaciones</label>
        <div class="relative">
          <button type="button" (click)="toggleDropdown('beds', $event)" 
            class="w-full bg-gray-50 border border-gray-100 text-brand-dark font-semibold rounded-2xl px-5 py-4 text-left focus:outline-none focus:bg-white focus:ring-2 focus:ring-brand-blue/20 focus:border-brand-blue/50 transition-all cursor-pointer shadow-sm flex items-center justify-between">
            <span class="truncate" [class.text-brand-blue]="filterBeds !== ''">{{ getDisplayValue('beds') }}</span>
            <svg class="w-4 h-4 text-brand-blue flex-shrink-0 transition-transform duration-200" [class.rotate-180]="activeDropdown === 'beds'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
          </button>
          
          <!-- Dropdown Habitaciones -->
          <div *ngIf="activeDropdown === 'beds'" 
            class="absolute top-full left-0 mt-2 w-full min-w-[200px] bg-white rounded-2xl shadow-xl shadow-brand-dark/10 border border-gray-100 py-2 z-50 animate-in fade-in zoom-in-95 duration-200 overflow-hidden">
            <button *ngFor="let opt of bedsOptions" (click)="selectOption('beds', opt.value, $event)"
              class="w-full text-left px-5 py-3 hover:bg-brand-blue/5 text-sm font-semibold transition-colors flex items-center justify-between"
              [class.text-brand-blue]="filterBeds === opt.value" [class.bg-brand-blue/5]="filterBeds === opt.value">
              {{ opt.label }}
              <svg *ngIf="filterBeds === opt.value" class="w-4 h-4 text-brand-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Reset Filters Button styled with corporate gradient -->
      <div class="w-full lg:w-auto">
        <button (click)="resetFilters()" title="Limpiar Filtros" class="w-full lg:w-14 h-14 bg-gradient-brand text-white rounded-2xl flex items-center justify-center hover:scale-105 active:scale-95 hover:shadow-lg hover:shadow-brand-blue/30 transition-all duration-300 shadow-md group">
          <span class="lg:hidden font-bold uppercase tracking-widest text-[11px] mr-2">Limpiar Filtros</span>
          <svg class="w-5 h-5 group-hover:rotate-180 transition-transform duration-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
        </button>
      </div>

    </div>
  </div>

  <!-- Loading State with Premium Glow -->
  <div *ngIf="isLoading" class="flex justify-center items-center py-28 animate-in fade-in duration-300">
    <div class="relative flex items-center justify-center">
      <!-- Outer glowing circle -->
      <div class="absolute inset-0 bg-brand-blue/20 rounded-full blur-xl scale-150 animate-pulse"></div>
      <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-brand-blue shadow-xl"></div>
    </div>
  </div>

  <!-- Content State -->
  <div *ngIf="!isLoading" class="animate-in fade-in duration-500">
    <app-featured-properties [properties]="propertiesList"></app-featured-properties>
  </div>
  <app-cta-banner></app-cta-banner>
</div>
