<div class="pt-20 bg-slate-50 min-h-screen" id="propiedades">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-10 mb-8">
    <div class="flex items-center justify-between">
      <div>
        <h1 class="text-3xl font-extrabold text-brand-dark font-sans">Catálogo de Propiedades</h1>
        <p class="text-gray-500 mt-2">Explora todas nuestras propiedades disponibles para venta y alquiler.</p>
      </div>
      <div class="text-sm font-bold text-brand-blue bg-brand-blue/10 px-4 py-2 rounded-xl" *ngIf="!isLoading">
        {{ propertiesList.length }} Propiedades
      </div>
    </div>
  </div>

  <!-- Filter Bar (Solo se muestra cuando ya ha cargado) -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mb-12" *ngIf="!isLoading && allProperties.length > 0">
    
    <!-- Title and Sort Dropdown aligned on the same row -->
    <div class="flex items-center justify-between mb-5 ml-2 animate-in fade-in slide-in-from-left-4 duration-700">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-gradient-brand flex items-center justify-center text-white shadow-md shadow-brand-blue/20">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"></path></svg>
        </div>
        <h3 class="text-xl font-extrabold text-brand-dark tracking-tight font-sans">Filtros Avanzados</h3>
      </div>

      <!-- Custom Dropdown with Gradient style aligned on the right -->
      <div class="relative">
        <button type="button" (click)="toggleDropdown('sort', $event)" 
          class="bg-gradient-brand text-white font-bold rounded-2xl px-6 py-3 shadow-md shadow-brand-blue/20 hover:scale-105 active:scale-95 transition-all duration-300 flex items-center gap-3 cursor-pointer text-sm">
          <span>Ordenar por: {{ getDisplayValue('sort') }}</span>
          <svg class="w-4 h-4 text-white flex-shrink-0 transition-transform duration-200" [class.rotate-180]="activeDropdown === 'sort'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path></svg>
        </button>
        
        <!-- Dropdown Menu -->
        <div *ngIf="activeDropdown === 'sort'" 
          class="absolute right-0 top-full mt-2 w-56 bg-white rounded-2xl shadow-xl shadow-brand-dark/10 border border-gray-100 py-2 z-50 animate-in fade-in zoom-in-95 duration-200 overflow-hidden">
          <button *ngFor="let opt of sortOptions" (click)="selectOption('sort', opt.value, $event)"
            class="w-full text-left px-5 py-3 hover:bg-brand-blue/5 text-sm font-semibold transition-colors flex items-center justify-between text-gray-700"
            [class.text-brand-blue]="filterSort === opt.value" [class.bg-brand-blue/5]="filterSort === opt.value">
            {{ opt.label }}
            <svg *ngIf="filterSort === opt.value" class="w-4 h-4 text-brand-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Main Container styled in alignment with the Homely Design System -->
    <div class="bg-white rounded-3xl p-6 shadow-xl shadow-brand-dark/5 border border-gray-100 relative animate-in fade-in slide-in-from-top-8 duration-700 hover:shadow-2xl hover:shadow-brand-blue/5 transition-shadow duration-500 flex flex-col gap-6">
      
      <!-- Primary Filters Row -->
      <div class="flex flex-col lg:flex-row gap-5 items-end">

        <!-- Ubicación -->
        <div class="w-full lg:w-auto flex-1 relative">
          <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest block mb-2.5 ml-2">Ubicación</label>
          <div class="relative">
            <input type="text" placeholder="Seleccionar en mapa..." [(ngModel)]="location" (click)="openMapModal()" readonly
              class="w-full bg-gray-50 border border-gray-100 text-brand-dark font-semibold rounded-2xl px-5 py-4 text-left focus:outline-none focus:bg-white focus:ring-2 focus:ring-brand-blue/20 focus:border-brand-blue/50 transition-all cursor-pointer shadow-sm truncate placeholder-gray-400/80">
            <button type="button" (click)="openMapModal()" class="absolute right-4 top-1/2 -translate-y-1/2 text-brand-blue hover:text-brand-dark transition-colors cursor-pointer">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
              </svg>
            </button>
          </div>
        </div>
        
        <!-- Operación -->
        <div class="w-full lg:w-auto flex-1 relative">
          <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest block mb-2.5 ml-2">Transacción</label>
          <div class="relative">
            <button type="button" (click)="toggleDropdown('transaction', $event)" 
              class="w-full bg-gray-50 border border-gray-100 text-brand-dark font-semibold rounded-2xl px-5 py-4 text-left focus:outline-none focus:bg-white focus:ring-2 focus:ring-brand-blue/20 focus:border-brand-blue/50 transition-all cursor-pointer shadow-sm flex items-center justify-between">
              <span class="truncate" [class.text-brand-blue]="filterTransaction !== ''">{{ getDisplayValue('transaction') }}</span>
              <svg class="w-4 h-4 text-brand-blue flex-shrink-0 transition-transform duration-200" [class.rotate-180]="activeDropdown === 'transaction'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </button>
            
            <!-- Dropdown Transacción -->
            <div *ngIf="activeDropdown === 'transaction'" 
              class="absolute top-full left-0 mt-2 w-full min-w-[200px] bg-white rounded-2xl shadow-xl shadow-brand-dark/10 border border-gray-100 py-2 z-50 animate-in fade-in zoom-in-95 duration-200 overflow-hidden">
              <button *ngFor="let opt of transactionOptions" (click)="selectOption('transaction', opt.value, $event)"
                class="w-full text-left px-5 py-3 hover:bg-brand-blue/5 text-sm font-semibold transition-colors flex items-center justify-between"
                [class.text-brand-blue]="filterTransaction === opt.value" [class.bg-brand-blue/5]="filterTransaction === opt.value">
                {{ opt.label.substring(0, 1).toUpperCase() + opt.label.slice(1) }}
                <svg *ngIf="filterTransaction === opt.value" class="w-4 h-4 text-brand-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
              </button>
            </div>
          </div>
        </div>

        <!-- Tipo de Inmueble -->
        <div class="w-full lg:w-auto flex-1 relative">
          <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest block mb-2.5 ml-2">Tipo de Inmueble</label>
          <div class="relative">
            <button type="button" (click)="toggleDropdown('type', $event)" 
              class="w-full bg-gray-50 border border-gray-100 text-brand-dark font-semibold rounded-2xl px-5 py-4 text-left focus:outline-none focus:bg-white focus:ring-2 focus:ring-brand-blue/20 focus:border-brand-blue/50 transition-all cursor-pointer shadow-sm flex items-center justify-between">
              <span class="truncate" [class.text-brand-blue]="filterType !== ''">{{ getDisplayValue('type') }}</span>
              <svg class="w-4 h-4 text-brand-blue flex-shrink-0 transition-transform duration-200" [class.rotate-180]="activeDropdown === 'type'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </button>
            
            <!-- Dropdown Tipo -->
            <div *ngIf="activeDropdown === 'type'" 
              class="absolute top-full left-0 mt-2 w-full min-w-[200px] bg-white rounded-2xl shadow-xl shadow-brand-dark/10 border border-gray-100 py-2 z-50 animate-in fade-in zoom-in-95 duration-200 overflow-hidden">
              <button *ngFor="let opt of typeOptions" (click)="selectOption('type', opt.value, $event)"
                class="w-full text-left px-5 py-3 hover:bg-brand-blue/5 text-sm font-semibold transition-colors flex items-center justify-between"
                [class.text-brand-blue]="filterType === opt.value" [class.bg-brand-blue/5]="filterType === opt.value">
                {{ opt.label.substring(0, 1).toUpperCase() + opt.label.slice(1) }}
                <svg *ngIf="filterType === opt.value" class="w-4 h-4 text-brand-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
              </button>
            </div>
          </div>
        </div>

        <!-- Presupuesto -->
        <div class="w-full lg:w-[35%] relative">
          <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest block mb-2.5 ml-2">Presupuesto</label>
          <div class="flex items-center gap-3">
            <div class="relative flex-1">
              <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-brand-blue font-bold text-sm">Mín</span>
              <input type="number" [(ngModel)]="filterMinPrice" (ngModelChange)="applyFilters()" placeholder="0 €" min="0" class="w-full bg-gray-50 border border-gray-100 text-brand-dark font-semibold rounded-2xl pl-14 pr-4 py-4 focus:outline-none focus:bg-white focus:ring-2 focus:ring-brand-blue/20 focus:border-brand-blue/50 transition-all placeholder-gray-400/80 shadow-sm">
            </div>
            <span class="text-gray-300 font-bold">-</span>
            <div class="relative flex-1">
              <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-brand-blue font-bold text-sm">Máx</span>
              <input type="number" [(ngModel)]="filterMaxPrice" (ngModelChange)="applyFilters()" placeholder="Sin límite" min="0" class="w-full bg-gray-50 border border-gray-100 text-brand-dark font-semibold rounded-2xl pl-14 pr-4 py-4 focus:outline-none focus:bg-white focus:ring-2 focus:ring-brand-blue/20 focus:border-brand-blue/50 transition-all placeholder-gray-400/80 shadow-sm">
            </div>
          </div>
        </div>

        <!-- Habitaciones -->
        <div class="w-full lg:w-auto flex-1 relative">
          <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest block mb-2.5 ml-2">Habitaciones</label>
          <div class="relative">
            <button type="button" (click)="toggleDropdown('beds', $event)" 
              class="w-full bg-gray-50 border border-gray-100 text-brand-dark font-semibold rounded-2xl px-5 py-4 text-left focus:outline-none focus:bg-white focus:ring-2 focus:ring-brand-blue/20 focus:border-brand-blue/50 transition-all cursor-pointer shadow-sm flex items-center justify-between">
              <span class="truncate" [class.text-brand-blue]="filterBeds !== ''">{{ getDisplayValue('beds') }}</span>
              <svg class="w-4 h-4 text-brand-blue flex-shrink-0 transition-transform duration-200" [class.rotate-180]="activeDropdown === 'beds'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </button>
            
            <!-- Dropdown Habitaciones -->
            <div *ngIf="activeDropdown === 'beds'" 
              class="absolute top-full left-0 mt-2 w-full min-w-[200px] bg-white rounded-2xl shadow-xl shadow-brand-dark/10 border border-gray-100 py-2 z-50 animate-in fade-in zoom-in-95 duration-200 overflow-hidden">
              <button *ngFor="let opt of bedsOptions" (click)="selectOption('beds', opt.value, $event)"
                class="w-full text-left px-5 py-3 hover:bg-brand-blue/5 text-sm font-semibold transition-colors flex items-center justify-between"
                [class.text-brand-blue]="filterBeds === opt.value" [class.bg-brand-blue/5]="filterBeds === opt.value">
                {{ opt.label }}
                <svg *ngIf="filterBeds === opt.value" class="w-4 h-4 text-brand-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
              </button>
            </div>
          </div>
        </div>

        <!-- Reset Filters Button styled with corporate gradient -->
        <div class="w-full lg:w-auto">
          <button (click)="resetFilters()" title="Limpiar Filtros" class="w-full lg:w-14 h-14 bg-gradient-brand text-white rounded-2xl flex items-center justify-center hover:scale-105 active:scale-95 hover:shadow-lg hover:shadow-brand-blue/30 transition-all duration-300 shadow-md group">
            <span class="lg:hidden font-bold uppercase tracking-widest text-[11px] mr-2">Limpiar Filtros</span>
            <svg class="w-5 h-5 group-hover:rotate-180 transition-transform duration-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
          </button>
        </div>

      </div>

      <!-- Collapsible Additional Filters Toggle -->
      <div class="flex justify-center border-t border-gray-100 pt-5 mt-2">
        <button type="button" (click)="showExtraFilters = !showExtraFilters"
          class="flex items-center gap-2.5 text-xs font-extrabold text-brand-blue uppercase tracking-widest transition-all duration-300 focus:outline-none py-2.5 px-6 rounded-full bg-brand-blue/5 hover:bg-brand-blue/15 hover:shadow-md hover:shadow-brand-blue/10 hover:-translate-y-0.5 active:scale-95 active:translate-y-0 cursor-pointer border border-brand-blue/10">
          <svg class="w-4 h-4 transition-transform duration-300" [class.rotate-180]="showExtraFilters" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path></svg>
          <span>{{ showExtraFilters ? 'Ocultar Filtros Adicionales' : 'Mostrar Filtros Adicionales' }}</span>
        </button>
      </div>

      <!-- Additional Filters Collapsible Panel -->
      <div *ngIf="showExtraFilters" 
        class="bg-slate-50 border border-slate-100 rounded-3xl p-6 mt-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 shadow-inner animate-in slide-in-from-top-4 fade-in zoom-in-95 duration-400">
        
        <!-- Baños -->
        <div class="relative">
          <label class="text-[11px] font-bold text-gray-500 uppercase tracking-widest block mb-2.5 ml-2">Baños</label>
          <div class="relative">
            <button type="button" (click)="toggleDropdown('baths', $event)" 
              class="w-full bg-white border border-gray-100 text-brand-dark font-semibold rounded-2xl px-5 py-3.5 text-left focus:outline-none focus:ring-2 focus:ring-brand-blue/20 focus:border-brand-blue/50 transition-all cursor-pointer shadow-sm flex items-center justify-between hover:shadow-md">
              <span class="truncate text-sm" [class.text-brand-blue]="filterBaths !== ''">{{ getDisplayValue('baths') }}</span>
              <svg class="w-4 h-4 text-brand-blue flex-shrink-0 transition-transform duration-200" [class.rotate-180]="activeDropdown === 'baths'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </button>
            
            <!-- Dropdown Baños -->
            <div *ngIf="activeDropdown === 'baths'" 
              class="absolute top-full left-0 mt-2 w-full min-w-[200px] bg-white rounded-2xl shadow-xl shadow-brand-dark/10 border border-gray-100 py-2 z-50 animate-in fade-in zoom-in-95 duration-200 overflow-hidden">
              <button *ngFor="let opt of bathsOptions" (click)="selectOption('baths', opt.value, $event)"
                class="w-full text-left px-5 py-3 hover:bg-brand-blue/5 text-sm font-semibold transition-colors flex items-center justify-between"
                [class.text-brand-blue]="filterBaths === opt.value" [class.bg-brand-blue/5]="filterBaths === opt.value">
                {{ opt.label }}
                <svg *ngIf="filterBaths === opt.value" class="w-4 h-4 text-brand-blue" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
              </button>
            </div>
          </div>
        </div>

        <!-- Superficie Mínima -->
        <div>
          <label class="text-[11px] font-bold text-gray-500 uppercase tracking-widest block mb-2.5 ml-2">Sup. Mínima (m²)</label>
          <div class="relative">
            <input type="number" [(ngModel)]="filterMinSize" (ngModelChange)="applyFilters()" placeholder="Ej. 60" min="0" 
              class="w-full bg-white border border-gray-100 text-brand-dark font-semibold text-sm rounded-2xl px-5 py-3.5 focus:outline-none focus:ring-2 focus:ring-brand-blue/20 focus:border-brand-blue/50 transition-all placeholder-gray-400/80 shadow-sm hover:shadow-md">
          </div>
        </div>

        <!-- Superficie Máxima -->
        <div>
          <label class="text-[11px] font-bold text-gray-500 uppercase tracking-widest block mb-2.5 ml-2">Sup. Máxima (m²)</label>
          <div class="relative">
            <input type="number" [(ngModel)]="filterMaxSize" (ngModelChange)="applyFilters()" placeholder="Sin límite" min="0" 
              class="w-full bg-white border border-gray-100 text-brand-dark font-semibold text-sm rounded-2xl px-5 py-3.5 focus:outline-none focus:ring-2 focus:ring-brand-blue/20 focus:border-brand-blue/50 transition-all placeholder-gray-400/80 shadow-sm hover:shadow-md">
          </div>
        </div>

        <!-- Comodidades / Extras Checklist -->
        <div class="md:col-span-2 lg:col-span-4 mt-2">
          <label class="text-[11px] font-bold text-gray-500 uppercase tracking-widest block mb-4 ml-2">Comodidades y Extras</label>
          <div class="flex flex-wrap gap-x-6 gap-y-4 px-2">
            <!-- Piscina -->
            <label class="flex items-center gap-3 cursor-pointer group">
              <input type="checkbox" [(ngModel)]="filterHasPool" (ngModelChange)="applyFilters()" class="hidden">
              <div class="w-5 h-5 rounded-md border bg-white flex items-center justify-center transition-all duration-200 group-hover:border-brand-blue/50 group-hover:shadow-md"
                [class.bg-brand-blue]="filterHasPool" [class.border-brand-blue]="filterHasPool" [class.border-gray-200]="!filterHasPool" [class.shadow-md]="filterHasPool" [class.shadow-brand-blue/20]="filterHasPool">
                <svg *ngIf="filterHasPool" class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
              </div>
              <span class="text-sm font-bold text-gray-600 group-hover:text-brand-blue transition-colors select-none">Piscina</span>
            </label>

            <!-- Jardín -->
            <label class="flex items-center gap-3 cursor-pointer group">
              <input type="checkbox" [(ngModel)]="filterHasGarden" (ngModelChange)="applyFilters()" class="hidden">
              <div class="w-5 h-5 rounded-md border bg-white flex items-center justify-center transition-all duration-200 group-hover:border-brand-blue/50 group-hover:shadow-md"
                [class.bg-brand-blue]="filterHasGarden" [class.border-brand-blue]="filterHasGarden" [class.border-gray-200]="!filterHasGarden" [class.shadow-md]="filterHasGarden" [class.shadow-brand-blue/20]="filterHasGarden">
                <svg *ngIf="filterHasGarden" class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
              </div>
              <span class="text-sm font-bold text-gray-600 group-hover:text-brand-blue transition-colors select-none">Jardín</span>
            </label>

            <!-- Terraza -->
            <label class="flex items-center gap-3 cursor-pointer group">
              <input type="checkbox" [(ngModel)]="filterHasTerrace" (ngModelChange)="applyFilters()" class="hidden">
              <div class="w-5 h-5 rounded-md border bg-white flex items-center justify-center transition-all duration-200 group-hover:border-brand-blue/50 group-hover:shadow-md"
                [class.bg-brand-blue]="filterHasTerrace" [class.border-brand-blue]="filterHasTerrace" [class.border-gray-200]="!filterHasTerrace" [class.shadow-md]="filterHasTerrace" [class.shadow-brand-blue/20]="filterHasTerrace">
                <svg *ngIf="filterHasTerrace" class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
              </div>
              <span class="text-sm font-bold text-gray-600 group-hover:text-brand-blue transition-colors select-none">Terraza</span>
            </label>

            <!-- Ascensor -->
            <label class="flex items-center gap-3 cursor-pointer group">
              <input type="checkbox" [(ngModel)]="filterHasElevator" (ngModelChange)="applyFilters()" class="hidden">
              <div class="w-5 h-5 rounded-md border bg-white flex items-center justify-center transition-all duration-200 group-hover:border-brand-blue/50 group-hover:shadow-md"
                [class.bg-brand-blue]="filterHasElevator" [class.border-brand-blue]="filterHasElevator" [class.border-gray-200]="!filterHasElevator" [class.shadow-md]="filterHasElevator" [class.shadow-brand-blue/20]="filterHasElevator">
                <svg *ngIf="filterHasElevator" class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
              </div>
              <span class="text-sm font-bold text-gray-600 group-hover:text-brand-blue transition-colors select-none">Ascensor</span>
            </label>

            <!-- Aire Acondicionado -->
            <label class="flex items-center gap-3 cursor-pointer group">
              <input type="checkbox" [(ngModel)]="filterHasAC" (ngModelChange)="applyFilters()" class="hidden">
              <div class="w-5 h-5 rounded-md border bg-white flex items-center justify-center transition-all duration-200 group-hover:border-brand-blue/50 group-hover:shadow-md"
                [class.bg-brand-blue]="filterHasAC" [class.border-brand-blue]="filterHasAC" [class.border-gray-200]="!filterHasAC" [class.shadow-md]="filterHasAC" [class.shadow-brand-blue/20]="filterHasAC">
                <svg *ngIf="filterHasAC" class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
              </div>
              <span class="text-sm font-bold text-gray-600 group-hover:text-brand-blue transition-colors select-none">Aire Acondicionado</span>
            </label>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Loading State with Premium Glow -->
  <div *ngIf="isLoading" class="flex justify-center items-center py-28 animate-in fade-in duration-300">
    <div class="relative flex items-center justify-center">
      <!-- Outer glowing circle -->
      <div class="absolute inset-0 bg-brand-blue/20 rounded-full blur-xl scale-150 animate-pulse"></div>
      <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-brand-blue shadow-xl"></div>
    </div>
  </div>

  <!-- Content State -->
  <div *ngIf="!isLoading" class="animate-in fade-in duration-500">
    


    <app-featured-properties [properties]="propertiesList"></app-featured-properties>
  </div>
  <app-cta-banner></app-cta-banner>
</div>

<!-- Modal del Mapa Interactivo -->
<div *ngIf="showMapModal"
  class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-gray-900/60 backdrop-blur-sm animate-fade-in">
  <div
    class="bg-white rounded-3xl shadow-2xl w-full max-w-5xl h-[85vh] md:h-[70vh] flex flex-col md:flex-row overflow-hidden animate-fade-in-up relative">

    <!-- Left panel: Controls -->
    <div
      class="w-full md:w-1/3 md:min-w-[320px] bg-white flex flex-col h-full z-10 shadow-[10px_0_20px_rgba(0,0,0,0.05)]">
      <!-- Header -->
      <div class="px-6 py-6 border-b border-gray-100 flex items-center justify-between bg-gray-50/50">
        <h3 class="text-xl font-bold text-brand-dark leading-tight">
          Selecciona tu <br><span class="text-brand-blue">ubicación ideal</span>
        </h3>
        <!-- Mobile close button -->
        <button (click)="closeMapModal()"
          class="md:hidden text-gray-400 hover:text-red-500 bg-white shadow-sm p-2 rounded-full transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>

      <!-- Scrollable content -->
      <div class="p-6 flex-1 overflow-y-auto flex flex-col gap-8">

        <!-- Buscar ciudad -->
        <div class="space-y-3">
          <label class="font-bold text-gray-700 text-sm uppercase tracking-wide">Buscar ciudad o zona</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
              </svg>
            </div>
            <input type="text" [(ngModel)]="searchQuery" (keyup.enter)="searchCity()" placeholder="Ej: Madrid Centro"
              class="w-full bg-gray-50 border border-gray-200 rounded-xl py-3.5 pl-11 pr-4 text-gray-800 font-medium outline-none focus:bg-white focus:border-brand-blue focus:ring-2 focus:ring-brand-blue/20 transition-all">
          </div>
        </div>

        <!-- Ubicación actual -->
        <button (click)="useCurrentLocation()"
          class="w-full flex items-center justify-center gap-2 bg-brand-blue/5 text-brand-blue font-bold hover:bg-brand-blue/10 border border-brand-blue/10 transition-colors py-3.5 rounded-xl">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z">
            </path>
          </svg>
          Utilizar mi ubicación actual
        </button>

        <!-- Distancia -->
        <div class="space-y-4">
          <div class="flex justify-between items-center">
            <label class="font-bold text-gray-700 text-sm uppercase tracking-wide">Radio de búsqueda</label>
            <span class="font-bold text-brand-blue bg-brand-blue/10 px-3 py-1 rounded-lg">{{distance}} km</span>
          </div>
          <input type="range" min="1" max="50" step="1" [(ngModel)]="distance" (input)="updateCircle()"
            class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-brand-blue">
        </div>
      </div>

      <!-- Footer action -->
      <div class="p-6 border-t border-gray-100 bg-gray-50">
        <button (click)="applyAndSearch()"
          class="w-full bg-gradient-brand text-white font-bold py-4 rounded-xl hover:shadow-lg hover:shadow-brand-blue/30 transition-all transform hover:-translate-y-0.5 active:translate-y-0 flex items-center justify-center gap-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
          </svg>
          Buscar
        </button>
      </div>
    </div>

    <!-- Right panel: Map -->
    <div class="w-full md:w-2/3 h-64 md:h-full relative bg-gray-100 flex-shrink-0 md:flex-shrink">
      <!-- Desktop close button -->
      <button (click)="closeMapModal()"
        class="hidden md:flex absolute top-4 right-4 z-[1000] bg-white text-gray-500 hover:text-red-500 shadow-md p-2 rounded-full transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>

      <div id="map-container" class="absolute inset-0 w-full h-full z-0"></div>

      <!-- Overlay helper text on map -->
      <div
        class="absolute bottom-6 left-1/2 -translate-x-1/2 z-[1000] bg-white/90 backdrop-blur-md px-6 py-3 rounded-full shadow-lg border border-white/20 text-sm font-bold text-gray-700 pointer-events-none whitespace-nowrap">
        Haz clic en el mapa para marcar el centro
      </div>
    </div>
  </div>
</div>
