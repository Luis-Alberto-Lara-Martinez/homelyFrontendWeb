<div class="pt-20 bg-slate-50 min-h-screen">
  
  <!-- Dynamic Radius Search Badge notification -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-10" *ngIf="isSearchFiltered">
    <div class="bg-white/80 backdrop-blur-md border border-brand-blue/10 rounded-[2rem] p-6 sm:p-8 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-6 shadow-[0_15px_40px_-20px_rgba(37,99,235,0.08)] animate-in fade-in slide-in-from-top-4 duration-500">
      <div class="flex items-center gap-5">
        <div class="w-14 h-14 rounded-2xl bg-brand-blue/10 flex items-center justify-center text-brand-blue shrink-0">
          <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
        </div>
        <div>
          <span class="inline-block text-[10px] font-black uppercase tracking-widest text-brand-blue bg-brand-blue/10 px-3 py-1 rounded-full">Búsqueda Geográfica Activa</span>
          <h2 class="text-xl font-extrabold text-brand-dark mt-1 font-sans">
            Hemos encontrado {{propertiesList.length}} {{propertiesList.length === 1 ? 'propiedad' : 'propiedades'}} dentro del radio puesto en {{searchRadiusKm}} Km
          </h2>
          <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mt-1">
            Búsqueda de propiedades realizada con éxito en base a tu selección geográfica.
          </p>
        </div>
      </div>
      <button (click)="clearSearchFilter()" 
        class="w-full sm:w-auto px-6 py-4 rounded-xl bg-white border border-gray-150 text-xs font-bold text-gray-500 uppercase tracking-widest hover:text-brand-blue hover:border-brand-blue/30 hover:shadow-sm transition-all active:scale-95">
        Ver catálogo completo
      </button>
    </div>
  </div>

  <app-featured-properties [properties]="propertiesList"></app-featured-properties>
  <app-cta-banner></app-cta-banner>
</div>
