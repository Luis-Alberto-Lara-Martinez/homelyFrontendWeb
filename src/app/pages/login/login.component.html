<div class="min-h-screen flex flex-col justify-center py-12 sm:px-6 lg:px-8 bg-gray-50/50">


  <div class="sm:mx-auto sm:w-full sm:max-w-lg pt-12">
    <div class="text-center">
      <a routerLink="/" class="inline-flex justify-center items-center gap-3 cursor-pointer group mb-6 w-full">
        <img src="/assets/logos/logo.png" alt="Homely Logo"
          class="w-14 h-14 object-contain rounded-2xl shadow-lg shadow-brand-blue/20 group-hover:scale-110 transition-transform duration-300">
        <span class="font-extrabold text-4xl text-brand-dark tracking-tight">Homely<span
            class="text-brand-blue">.</span></span>
      </a>
      <h2 class="mt-2 text-3xl font-extrabold text-brand-dark">
        Bienvenido de nuevo
      </h2>
      <p class="mt-3 text-base text-gray-600">
        O
        <a routerLink="/registro" class="font-bold text-brand-blue hover:text-brand-dark transition-colors">
          crea una cuenta nueva
        </a>
      </p>
    </div>
  </div>


  <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-lg pb-12">

    <div
      class="bg-white py-10 px-6 shadow-2xl shadow-brand-blue/10 sm:rounded-3xl sm:px-12 border border-blue-50/50 transition-shadow hover:shadow-brand-blue/20 duration-500">

      <form class="space-y-7" [formGroup]="loginForm" (ngSubmit)="onSubmit()">

        <div>
          <label for="email" class="block text-sm font-bold text-gray-700 tracking-wide mb-2 uppercase">
            Correo electrónico
          </label>
          <div class="mt-1 relative rounded-2xl shadow-sm group">
            <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none">
              <svg class="h-6 w-6 text-gray-400 group-focus-within:text-brand-blue transition-colors duration-300"
                xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z" />
                <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z" />
              </svg>
            </div>

            <input id="email" formControlName="email" type="email" autocomplete="email" required
              class="appearance-none block w-full pl-14 pr-4 py-4 border-2 border-gray-100 rounded-2xl focus:outline-none focus:ring-0 focus:border-brand-blue text-base text-gray-900 placeholder-gray-400 bg-gray-50/50 focus:bg-white transition-all duration-300"
              placeholder="tu@email.com">
          </div>
          <div *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
            class="text-red-500 text-sm mt-1 font-medium">
            <span *ngIf="loginForm.get('email')?.errors?.['required']">El correo es obligatorio.</span>
            <span *ngIf="loginForm.get('email')?.errors?.['email']">Ingrese un correo válido.</span>
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-bold text-gray-700 tracking-wide mb-2 uppercase">
            Contraseña
          </label>
          <div class="mt-1 relative rounded-2xl shadow-sm group">
            <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none">
              <svg class="h-6 w-6 text-gray-400 group-focus-within:text-brand-blue transition-colors duration-300"
                xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path fill-rule="evenodd"
                  d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z"
                  clip-rule="evenodd" />
              </svg>
            </div>

            <input id="password" formControlName="password" type="password" autocomplete="current-password" required
              class="appearance-none block w-full pl-14 pr-4 py-4 border-2 border-gray-100 rounded-2xl focus:outline-none focus:ring-0 focus:border-brand-blue text-base text-gray-900 placeholder-gray-400 bg-gray-50/50 focus:bg-white transition-all duration-300"
              placeholder="••••••••">
          </div>
          <div *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
            class="text-red-500 text-sm mt-1 font-medium">
            <span *ngIf="loginForm.get('password')?.errors?.['required']">La contraseña es obligatoria.</span>
            <span *ngIf="loginForm.get('password')?.errors?.['minlength']">La contraseña debe tener al menos 6
              caracteres.</span>
          </div>
        </div>

        <div class="flex items-center justify-end">
          <div class="text-sm">
            <a href="#" class="font-bold text-brand-blue hover:text-brand-dark transition-colors">
              ¿Olvidaste tu contraseña?
            </a>
          </div>
        </div>

        <div *ngIf="errorMessage" class="text-red-500 text-center font-semibold text-sm">
          {{ errorMessage }}
        </div>

        <div class="pt-2">
          <button type="submit" [disabled]="isLoading"
            class="w-full flex justify-center py-4 px-4 border border-transparent rounded-2xl shadow-xl shadow-brand-blue/30 text-lg font-bold text-white bg-gradient-brand hover:opacity-95 hover:shadow-brand-blue/40 focus:outline-none transition-all duration-300 hover:-translate-y-1 active:scale-95 active:translate-y-0 disabled:opacity-50">
            {{ isLoading ? 'Iniciando sesión...' : 'Iniciar Sesión' }}
          </button>
        </div>
      </form>

      <div class="mt-8">
        <div class="relative">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-200"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-3 bg-white text-gray-500 font-medium">O continuar con</span>
          </div>
        </div>

        <div class="mt-6 grid grid-cols-2 gap-4">
          <!-- Botón Google -->
          <button type="button" (click)="signInWithGoogle()"
            class="w-full flex items-center justify-center px-4 py-3 border border-gray-200 rounded-2xl shadow-sm bg-white text-sm font-bold text-gray-700 hover:bg-gray-50 hover:shadow-md transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-offset-1 focus:ring-gray-200">
            <svg class="h-5 w-5 mr-2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                fill="#4285F4" />
              <path
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                fill="#34A853" />
              <path
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                fill="#FBBC05" />
              <path
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                fill="#EA4335" />
            </svg>
            Google
          </button>

          <!-- Botón Microsoft -->
          <button type="button" (click)="signInWithMicrosoft()"
            class="w-full flex items-center justify-center px-4 py-3 border border-gray-200 rounded-2xl shadow-sm bg-white text-sm font-bold text-gray-700 hover:bg-gray-50 hover:shadow-md transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-offset-1 focus:ring-gray-200">
            <svg class="h-5 w-5 mr-2" viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg">
              <path d="M0 0h10v10H0z" fill="#f25022" />
              <path d="M11 0h10v10H11z" fill="#7fba00" />
              <path d="M0 11h10v10H0z" fill="#00a4ef" />
              <path d="M11 11h10v10H11z" fill="#ffb900" />
            </svg>
            Microsoft
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
